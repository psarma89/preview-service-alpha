# Local development for service-alpha.
#
# Usage:
#   docker compose up --build       → http://localhost:9001/docs
#   docker compose run --rm migrate → run migrations

x-common-env: &common-env
  DATABASE_URL: postgresql://postgres:postgres@db:5432/appdb
  ENVIRONMENT: local
  API_TOKEN: dev-token

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      <<: *common-env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

  app:
    build: .
    ports:
      - "9001:8000"
    environment:
      <<: *common-env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./alembic:/app/alembic

volumes:
  pgdata:
